<svg xmlns="http://www.w3.org/2000/svg" viewBox="-9.60 -150.55 232.24 232.24" role="img" aria-label="JTS monogram" fill="currentColor" color="#6f6959">
  <title>JTS monogram - J and S at cap height, the T lowered below the shared baseline</title>
  <style>
    /* Loaded via img the SVG cannot inherit the page ink, so it carries its
       own muted default (the app's muted token) plus a dark-scheme swap.
       Inlined or via use, currentColor still lets the page take over. */
    :root { color: #6f6959; }
    @media (prefers-color-scheme: dark) { :root { color: #9c947f; } }
  </style>
  <!--
    JTS lowered-T monogram, re-cut for FeatherReader's colophon.
    Glyph outlines extracted (fontTools) from Playfair Display Bold (wght 700),
    (c) 2017 The Playfair Display Project Authors, licensed under the
    SIL Open Font License 1.1 (https://openfontlicense.org). Embedding outlines
    in a document is permitted by the OFL; "Playfair" is a Reserved Font Name
    and is deliberately not used in this asset's filename.
    Composition: J and S share the cap band; the T is set smaller with its
    crossbar dropped to the J/S mid-line and its stem descending below the
    shared baseline (the wink). Single ink via currentColor; a small same-ink
    stroke floor (paint-order: stroke) keeps hairlines legible at ~40-48px.
  -->
