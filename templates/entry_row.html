<li class="entry-row{% if e.read %} is-read{% endif %}" id="entry-{{ e.id }}">
  <a class="entry-link" href="{{ e.link }}">
    <span class="entry-title">{{ e.title }}</span>
    <span class="entry-meta">
      {% if !e.feed_title.is_empty() %}<span class="entry-feed">{{ e.feed_title }}</span>{% endif %}
      {% if !e.published.is_empty() %}<span class="entry-date">{{ e.published }}</span>{% endif %}
    </span>
  </a>
  <div class="entry-actions">
    <form
      class="star-form"
      method="post"
      action="/entries/{{ e.id }}/star"
      hx-post="/entries/{{ e.id }}/star"
      hx-target="#entry-{{ e.id }}"
      hx-swap="outerHTML"
    >
      <input type="hidden" name="starred" value="{% if e.starred %}false{% else %}true{% endif %}" />
      <button
        type="submit"
        class="star{% if e.starred %} is-starred{% endif %}"
        title="{% if e.starred %}Unstar{% else %}Star{% endif %}"
        aria-label="{% if e.starred %}Unstar{% else %}Star{% endif %}"
      >
        {% if e.starred %}★{% else %}☆{% endif %}
      </button>
    </form>
    <form
      class="mark-read-form"
      method="post"
      action="/entries/{{ e.id }}/read"
      hx-post="/entries/{{ e.id }}/read"
      hx-target="#entry-{{ e.id }}"
      hx-swap="outerHTML"
    >
      <input type="hidden" name="read" value="{% if e.read %}false{% else %}true{% endif %}" />
      <button type="submit" class="mark-read">
        {% if e.read %}Mark unread{% else %}Mark read{% endif %}
      </button>
    </form>
  </div>
</li>
