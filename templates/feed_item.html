<li>
  <a
    class="feed-link{% if feed.unread > 0 %} has-unread{% endif %}"
    href="/?feed={{ feed.url|urlencode }}&view={{ nav.view }}"
    {% if feed.selected %}aria-current="page"{% endif %}
  >
    <span class="feed-name">{{ feed.title }}</span>
    {% if feed.unread > 0 %}<span class="feed-count">{{ feed.unread }}</span>{% endif %}
  </a>
</li>
